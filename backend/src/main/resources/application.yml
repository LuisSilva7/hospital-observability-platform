spring:
  application:
    name: hospital-observability-platform
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hop}
    username: ${POSTGRES_USER:hop}
    password: ${POSTGRES_PASSWORD:hop}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

hop:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
