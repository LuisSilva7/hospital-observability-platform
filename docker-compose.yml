services:
  postgres:
    image: postgres:16-alpine
    container_name: hop-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hop}
      POSTGRES_USER: ${POSTGRES_USER:-hop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hop}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hop} -d ${POSTGRES_DB:-hop}"]
      interval: 5s
      timeout: 3s
      retries: 10

  n8n:
    image: n8nio/n8n:latest
    container_name: hop-n8n
    environment:
      N8N_PORT: 5678
      N8N_SECURE_COOKIE: "false"
      GENERIC_TIMEZONE: Europe/Lisbon
    ports:
      - "5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n

  # --- perfil "full": plataforma inteira em containers ---
  # docker compose --profile full up -d --build
  backend:
    build: ./backend
    container_name: hop-backend
    profiles: ["full"]
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-hop}
      POSTGRES_USER: ${POSTGRES_USER:-hop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hop}
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-claude-sonnet-5}
      LLM_REDACTED_FIELDS: ${LLM_REDACTED_FIELDS:-}
      # dentro da rede do compose o n8n é "n8n", não "localhost"
      N8N_WEBHOOK_BASE_URL: http://n8n:5678
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-30}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8080' || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 18

  frontend:
    build: ./frontend
    container_name: hop-frontend
    profiles: ["full"]
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres-data:
  n8n-data:
